<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Tajawal',sans-serif;
    background:#0f172a;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;flex-direction:column;gap:24px;
    color:#fff;text-align:center;padding:20px;
  }
  .icon{font-size:56px}
  h1{font-size:22px;font-weight:900;color:#25d366}
  p{font-size:15px;color:#94a3b8;max-width:300px;line-height:1.6}
  .counter{
    background:#1e293b;border-radius:16px;padding:20px 40px;
    font-size:48px;font-weight:900;color:#fff;
    border:2px solid #25d366;min-width:140px;
  }
  .counter span{display:block;font-size:13px;font-weight:400;color:#94a3b8;margin-top:4px}
  .btn{
    background:#25d366;color:#fff;border:none;border-radius:14px;
    padding:14px 32px;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:700;
    cursor:pointer;transition:.2s;width:100%;max-width:280px;
  }
  .btn:hover{opacity:.9;transform:scale(1.02)}
  .log{
    background:#1e293b;border-radius:12px;padding:12px 16px;
    font-size:13px;color:#4ade80;max-width:320px;width:100%;
    text-align:right;max-height:120px;overflow-y:auto;
  }
  .log div{border-bottom:1px solid #1e3a5f;padding:4px 0;direction:rtl}
  .log div:last-child{border:none}
</style>
</head>
<body>

<div class="icon">📡</div>
<h1>تفعيل بكسل TikTok</h1>
<p>كل ضغطة على الزر ترسل حدث Contact مباشرة لـ TikTok Events Manager</p>

<div class="counter" id="cnt">0<span>أحداث مُرسَلة</span></div>

<button class="btn" onclick="fireEvent()">🔥 أرسل حدث الاتصال</button>

<div class="log" id="log"><div style="color:#64748b">في انتظار إرسال أول حدث...</div></div>

<script>
var count = 0;

/* أطلق حدث تلقائي عند فتح الصفحة */
window.addEventListener('load', function(){
  setTimeout(fireEvent, 1500);
});

function fireEvent() {
  count++;
  document.getElementById('cnt').childNodes[0].nodeValue = count;

  if (window.ttq) {
    window.ttq.track('Contact', { content_type: 'whatsapp', value: 145, currency: 'SAR' });
  }

  var now = new Date();
  var time = now.toLocaleTimeString('ar-SA');
  var log = document.getElementById('log');
  if (count === 1) log.innerHTML = '';
  var div = document.createElement('div');
  div.textContent = '✅ حدث #' + count + ' — ' + time;
  log.insertBefore(div, log.firstChild);
}
</script>

</body>
</html>
